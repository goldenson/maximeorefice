<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

<head>
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="{% if page.type != null %}{{ page.type }}{% elsif page.layout == "post" %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:image" content="{% if page.image != null %}{{ page.image }}{% else %}/assets/images/posts/me.jpg{% endif %}">

  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon-180.png">
  <link rel="alternate icon" href="/favicon.ico" sizes="any">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1b1b1d" media="(prefers-color-scheme: dark)">

  {% include head.html %}
  {% seo %}
</head>

<body>

  {%- include header.html -%}

  <main class="page-content interface" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  {%- include footer.html -%}

  <script src="/assets/darkmode.js?v={{ site.time | date: '%s' }}"></script>
  <script src="/assets/header.js?v={{ site.time | date: '%s' }}"></script>
  <script src="/assets/lazyload.js?v={{ site.time | date: '%s' }}"></script>
  <script src="/assets/tables.js?v={{ site.time | date: '%s' }}"></script>
  <script src="/assets/reading-progress.js?v={{ site.time | date: '%s' }}"></script>
  <script src="/assets/books-pagination.js?v={{ site.time | date: '%s' }}"></script>

  <!-- 100% privacy-first analytics -->
  <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>

</html>
