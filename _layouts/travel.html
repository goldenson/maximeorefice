---
layout: default
---
<div class="reading-progress" aria-hidden="true">
  <div class="reading-progress-bar" id="reading-progress-bar"></div>
</div>

<article class="post travel-post h-entry" itemscope itemtype="http://schema.org/BlogPosting">
  {% if page.image %}
  <div class="travel-hero">
    <img class="travel-cover" src="{{ page.image | relative_url }}" alt="{{ page.title | strip_html | escape }}" itemprop="image">
    <div class="travel-hero-overlay">
      <h1 class="post-title travel-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
      <p class="post-meta travel-meta">
        <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
          Mise à jour le {{ page.last_modified_at | date: "%Y-%m-%d" }}
        </time>
      </p>
    </div>
  </div>
  {% else %}
  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        Mise à jour le {{ page.last_modified_at | date: "%Y-%m-%d" }}
      </time>
    </p>
  </header>
  {% endif %}

  <div class="post-content e-content travel-content" itemprop="articleBody">
    {{ content }}
  </div>

  <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>
</article>
