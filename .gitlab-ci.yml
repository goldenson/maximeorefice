image: ruby:latest

cache:
  paths:
    - vendor/

stages:
  - build
  - deploy
  - scheduled_task

before_script:
  - gem install bundler
  - bundle config set path 'vendor'
  - bundle install

build_site:
  stage: build
  script:
    - bundle exec jekyll build
  artifacts:
    paths:
      - _site/
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:
  stage: deploy
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    KAMAL_REGISTRY_USERNAME: gitlab-ci-token
    KAMAL_REGISTRY_PASSWORD: $CI_JOB_TOKEN
    GEM_HOME: $CI_PROJECT_DIR/.kamal-gems
  cache:
    key: kamal-2.10.1
    paths:
      - .kamal-gems/
  before_script:
    - apk add --no-cache ruby openssh-client git
    - export PATH="$GEM_HOME/bin:$PATH"
    - >
      gem list -i kamal -v 2.10.1 --silent ||
      (apk add --no-cache ruby-dev build-base linux-headers && gem install kamal -v 2.10.1)
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - printf 'Host 91.214.191.37\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' > ~/.ssh/config
  script:
    - kamal deploy
  needs:
    - build_site
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - when: never

birthday_job:
  stage: scheduled_task
  variables:
    TELEGRAM_TOKEN: $TELEGRAM_TOKEN
    GROUP_ID: $GROUP_ID
  script:
    - bundle exec ruby scripts/daily_birthday.rb
  rules:
    - if: '$SCHEDULE_TASK == "crossfit"'
      when: never
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_success
    - when: never

crossfit_job:
  stage: scheduled_task
  variables:
    TELEGRAM_CROSSFIT_TOKEN: $TELEGRAM_CROSSFIT_TOKEN
    CROSSFIT_CHAT_ID: $CROSSFIT_CHAT_ID
  script:
    - bundle exec ruby scripts/crossfit_bot.rb
    - |
      if ! git diff --quiet -- _data/database.sqlite; then
        git config user.email "ci@maximeorefice.com"
        git config user.name "GitLab CI"
        git add _data/database.sqlite
        git commit -m "update trainings"
        git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git pull --rebase origin "$CI_COMMIT_REF_NAME"
        git push origin "HEAD:$CI_COMMIT_REF_NAME"
      else
        echo "No training update recorded, nothing to commit."
      fi
  timeout: 1h
  allow_failure: true
  rules:
    - if: '$SCHEDULE_TASK == "crossfit"'
      when: on_success
    - when: never
